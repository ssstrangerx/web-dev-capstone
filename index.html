<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUMS - Login</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>🎓 SUMS</h1>
      <h2>Smart University Management System</h2>

      <form id="loginForm">
        <label for="email">Email ID:</label>
        <input type="email" id="email" required />

        <label for="password">Password:</label>
        <input type="password" id="password" required />

        <label>Login As:</label>
        <div class="role-group">
          <label class="role-option">
            <input type="radio" name="role" value="student" required />
            Student
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="teacher" required />
            Teacher
          </label>
        </div>

        <input type="submit" value="Login" />
      </form>

      <div class="links">
        <p>Don't have an account?</p>
        <a href="form.html">Register as Student</a> |
        <a href="teacher_form.html">Register as Teacher</a>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          try {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const selectedRole = document.querySelector(
              'input[name="role"]:checked',
            ).value;

            console.log("🔐 Login attempt:", { email, selectedRole });

            // STEP 1: Sign in
            console.log("📝 Signing in with email/password...");
            const { data, error } = await client.auth.signInWithPassword({
              email,
              password,
            });

            if (error) {
              console.error("❌ Auth Error:", error);
              alert("Login failed: " + error.message);
              return;
            }

            console.log("✅ Auth successful");

            // STEP 2: Extract user ID from auth response (DON'T call getUser())
            if (!data.user || !data.user.id) {
              console.error("❌ No user in auth response");
              alert("Auth failed: No user data");
              return;
            }

            const userId = data.user.id;
            console.log("✅ User ID:", userId);

            // STEP 3: Wait a moment for profile to be accessible
            console.log("⏳ Waiting 2 seconds before profile query...");
            await new Promise((resolve) => setTimeout(resolve, 2000));

            // STEP 4: Query profile using the user ID from auth response
            console.log("🔎 Querying profile for user ID:", userId);
            const { data: profile, error: queryError } = await client
              .from("profiles")
              .select("*")
              .eq("id", userId)
              .maybeSingle();

            console.log("Query result:", { profile, queryError });

            if (queryError) {
              console.error("❌ Query Error:", queryError);
              alert("Error fetching profile: " + queryError.message);
              return;
            }

            if (!profile) {
              console.error("❌ Profile not found for user:", userId);
              alert("Profile not found! Please register first.");
              return;
            }

            console.log("✅ Profile found:", profile.full_name);
            console.log("Profile role:", profile.role);

            // STEP 5: Verify role
            if (profile.role !== selectedRole) {
              console.warn("⚠️ Role mismatch");
              alert(
                `You are registered as ${profile.role}, not ${selectedRole}`,
              );
              return;
            }

            console.log("✅ Role verified");

            // STEP 6: Redirect
            console.log("🚀 Redirecting to dashboard...");
            if (profile.role === "student") {
              window.location.href = "Students.html";
            } else if (profile.role === "teacher") {
              window.location.href = "teacher.html";
            }
          } catch (err) {
            console.error("❌ Unexpected error:", err);
            alert("Error: " + err.message);
          }
        });
    </script>
  </body>
</html>
