<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUMS - Login</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>🎓 SUMS</h1>
      <h2>Smart University Management System</h2>

      <form id="loginForm">
        <label for="email">Email ID:</label>
        <input type="email" id="email" required />

        <label for="password">Password:</label>
        <input type="password" id="password" required />

        <label>Login As:</label>
        <div class="role-group">
          <label class="role-option">
            <input type="radio" name="role" value="student" required />
            Student
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="teacher" required />
            Teacher
          </label>
        </div>

        <input type="submit" value="Login" />
      </form>

      <div class="links">
        <p>Don't have an account?</p>
        <a href="form.html">Register as Student</a> |
        <a href="teacher_form.html">Register as Teacher</a>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          try {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const selectedRole = document.querySelector(
              'input[name="role"]:checked',
            ).value;

            console.log("🔐 Login attempt:", { email, selectedRole });

            // STEP 1: Sign in with email/password
            console.log("📝 Signing in...");
            const { data: authData, error: authError } =
              await client.auth.signInWithPassword({
                email,
                password,
              });

            if (authError) {
              console.error("❌ Auth Error:", authError);
              alert("Login failed: " + authError.message);
              return;
            }

            console.log("✅ Auth successful");

            // STEP 2: WAIT LONGER for session to be fully established
            console.log("⏳ Waiting 3 seconds for session to initialize...");
            await new Promise((resolve) => setTimeout(resolve, 3000));

            // STEP 3: Get fresh user data from session
            console.log("🔍 Fetching current user from session...");
            const { data: userData, error: userError } =
              await client.auth.getUser();

            if (userError) {
              console.error("❌ Get User Error:", userError);
              alert("Session error: " + userError.message);
              return;
            }

            if (!userData.user) {
              console.error("❌ No user in session");
              alert("Session lost. Please try again.");
              return;
            }

            const userId = userData.user.id;
            console.log("✅ Current user ID:", userId);

            // STEP 4: Query profile with explicit error handling
            console.log("🔎 Querying profiles table...");
            const { data: profile, error: queryError } = await client
              .from("profiles")
              .select("*")
              .eq("id", userId)
              .maybeSingle();

            // Log all details
            console.log("Query result:", { profile, queryError });

            if (queryError) {
              console.error("❌ Query Error Details:", {
                message: queryError.message,
                code: queryError.code,
                status: queryError.status,
              });
              alert("Error fetching profile: " + queryError.message);
              return;
            }

            if (!profile) {
              console.error(
                "❌ Profile not found in database for user:",
                userId,
              );
              alert("Profile not found! Please register first.");
              return;
            }

            console.log(
              "✅ Profile found:",
              profile.full_name,
              "Role:",
              profile.role,
            );

            // STEP 5: Verify role matches
            if (profile.role !== selectedRole) {
              console.warn("⚠️ Role mismatch");
              alert(
                `Role mismatch! You registered as ${profile.role}, not ${selectedRole}`,
              );
              return;
            }

            console.log("✅ Role verified");

            // STEP 6: Redirect to dashboard
            console.log("🚀 Redirecting to dashboard...");
            if (profile.role === "student") {
              window.location.href = "Students.html";
            } else if (profile.role === "teacher") {
              window.location.href = "teacher.html";
            }
          } catch (err) {
            console.error("❌ Unexpected error:", err);
            alert("Error: " + err.message);
          }
        });
    </script>
  </body>
</html>
