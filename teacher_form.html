<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Registration - SUMS</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <h1>👨‍🏫 Teacher Registration</h1>

    <form id="teacherRegForm">
      <label for="fullName">Full Name:</label>
      <input type="text" id="fullName" placeholder="e.g., Dr. John Smith" required />

      <label for="employeeId">Employee ID:</label>
      <input type="text" id="employeeId" required />

      <label for="email">Official Email ID:</label>
      <input type="email" id="email" required />

      <label for="password">Password:</label>
      <input type="password" id="password" minlength="7" required />

      <label for="designation">Designation:</label>
      <select id="designation" required>
        <option value="">-- Select Designation --</option>
        <option value="Professor">Professor</option>
        <option value="Assistant Professor">Assistant Professor</option>
        <option value="Lecturer">Lecturer</option>
        <option value="Dean">Dean</option>
      </select>

      <input type="submit" value="Register as Teacher" />
    </form>

    <div class="links">
      <p>Already have an account? <a href="index.html">Login here</a></p>
    </div>
  </div>

  <script>
    document.getElementById("teacherRegForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        const fullName = document.getElementById("fullName").value;
        const employeeId = document.getElementById("employeeId").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const designation = document.getElementById("designation").value;

        console.log("🚀 Teacher registration submitted");

        // Step 1: Sign up
        const { data, error } = await client.auth.signUp({
          email,
          password,
        });

        if (error) {
          console.error("❌ Auth Error:", error);
          alert("Registration failed: " + error.message);
          return;
        }

        console.log("✅ Auth account created");

        if (!data.user || !data.user.id) {
          alert("User not properly created");
          return;
        }

        // Step 2: Wait for auth to commit
        console.log("⏳ Waiting 1.5 seconds...");
        await new Promise((resolve) => setTimeout(resolve, 1500));

        // Step 3: Insert profile
        const { error: profileError } = await client.from("profiles").insert([
          {
            id: data.user.id,
            email,
            full_name: fullName,
            role: "teacher",
            employee_id: employeeId,
            designation: designation,
          },
        ]);

        if (profileError) {
          console.error("❌ Profile Insert Error:", profileError);
          alert("Profile save failed: " + profileError.message);
          return;
        }

        console.log("✅ Teacher profile created successfully");
        alert("✅ Registration successful! Redirecting to login...");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
      } catch (err) {
        console.error("❌ Unexpected error:", err);
        alert("Error: " + err.message);
      }
    });
  </script>
</body>
</html>
